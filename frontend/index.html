<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ask questions about your books using local AI" />

    <!-- Favicon — book emoji as icon -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>"
    />

    <title>Book RAG — Ask Your Books</title>

    <style>
      /* Prevents white flash before React loads */
      html, body {
        margin: 0;
        padding: 0;
        background-color: #ffffff;
      }

      /* Loading screen shown before React mounts */
      #root:empty::before {
        content: "Loading...";
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: system-ui, sans-serif;
        font-size: 16px;
        color: #9ca3af;
      }
    </style>
  </head>

  <body>
    <!-- React mounts your entire app here -->
    <div id="root"></div>

    <!-- Vite injects main.jsx here automatically during build -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
